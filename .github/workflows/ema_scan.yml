name: EMA Scanner — Every 20 Min

on:
  schedule:
    # Every 20 minutes, Mon–Fri, 9:15 AM to 3:30 PM IST
    # IST = UTC+5:30, so 9:15 IST = 3:45 UTC, 3:30 IST = 10:00 UTC
    - cron: "45 3 * * 1-5"
    - cron: "5 4 * * 1-5"
    - cron: "25 4 * * 1-5"
    - cron: "45 4 * * 1-5"
    - cron: "5 5 * * 1-5"
    - cron: "25 5 * * 1-5"
    - cron: "45 5 * * 1-5"
    - cron: "5 6 * * 1-5"
    - cron: "25 6 * * 1-5"
    - cron: "45 6 * * 1-5"
    - cron: "5 7 * * 1-5"
    - cron: "25 7 * * 1-5"
    - cron: "45 7 * * 1-5"
    - cron: "5 8 * * 1-5"
    - cron: "25 8 * * 1-5"
    - cron: "45 8 * * 1-5"
    - cron: "5 9 * * 1-5"
    - cron: "25 9 * * 1-5"
    - cron: "45 9 * * 1-5"
    - cron: "0 10 * * 1-5"

  workflow_dispatch:   # Manual trigger bhi kar sakte ho

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EMA Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
